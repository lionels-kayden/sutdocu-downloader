<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocuCapture Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1f2937;
      }
      ::-webkit-scrollbar-thumb {
        background: #4b5563;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6b7280;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body class="bg-gray-900 text-white w-[400px] h-[600px] overflow-hidden flex flex-col font-sans">
    
    <!-- Header -->
    <div class="p-4 bg-gray-800 border-b border-gray-700 shadow-lg z-10">
      <div class="flex items-center gap-2 mb-1">
        <!-- Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400">
          <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <line x1="10" y1="9" x2="8" y2="9"></line>
        </svg>
        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
          DocuCapture Pro
        </h1>
      </div>
      <p class="text-xs text-gray-400">Coordinate-based WYSIWYG Extractor</p>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-5 flex flex-col gap-6 overflow-y-auto">
      
      <!-- Selector Input -->
      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-300 ml-1">
          Target CSS Selector
        </label>
        <div class="relative">
          <input
            type="text"
            id="selectorInput"
            value=".pf"
            class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all placeholder-gray-600 font-mono"
            placeholder=".pf, .page-content, etc."
          />
          <div class="absolute right-3 top-3 text-xs text-gray-500 pointer-events-none">
            Default: .pf
          </div>
        </div>
        <p class="text-xs text-gray-500 ml-1">
          Identify the container class for each document page.
        </p>
      </div>

      <!-- Status Display -->
      <div id="progressContainer" class="bg-gray-800/50 rounded-lg p-4 border border-gray-700 hidden">
          <div class="flex justify-between text-sm mb-2">
            <span class="text-gray-300">Progress</span>
            <span id="progressText" class="text-blue-400 font-mono">0%</span>
          </div>
          <div class="w-full bg-gray-700 rounded-full h-2.5 overflow-hidden">
            <div 
              id="progressBar"
              class="bg-blue-500 h-2.5 rounded-full transition-all duration-300 ease-out" 
              style="width: 0%"
            ></div>
          </div>
      </div>

      <!-- Action Button -->
      <button
        id="startBtn"
        class="group relative w-full flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-bold text-sm transition-all shadow-lg bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white hover:shadow-blue-500/25 active:scale-[0.98]"
      >
        <span id="btnIcon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </span>
        <span id="btnText">Start Capture</span>
      </button>
    </div>

    <!-- Logs Area -->
    <div class="h-48 bg-black/40 border-t border-gray-800 flex flex-col">
      <div class="px-4 py-2 border-b border-gray-800/50 flex items-center justify-between">
          <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">System Logs</span>
          <span id="activeIndicator" class="flex h-2 w-2 rounded-full bg-green-500 animate-pulse hidden"></span>
      </div>
      <div 
        id="logContainer"
        class="flex-1 overflow-y-auto p-4 space-y-1 font-mono text-xs text-gray-400"
      >
        <span class="text-gray-600 italic">Ready to initialize...</span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
